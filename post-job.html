<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job | RozgarSathi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .card { max-width: 600px; margin: 0 auto; background: white; padding: 35px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2563eb; text-align: center; margin-bottom: 30px; font-weight: 800; font-size: 1.6rem; }
        .section-h { background: #eff6ff; padding: 12px 15px; margin: 25px 0 15px; font-weight: 700; color: #2563eb; border-radius: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-left: 5px solid #2563eb; }
        .group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #64748b; }
        input, textarea { width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 14px; transition: 0.2s; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #2563eb; background: #fff; }
        textarea { height: 80px; resize: none; }
        .btn { width: 100%; background: #2563eb; color: white; padding: 18px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 1rem; transition: background 0.3s; }
        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Post Your Hiring Needs</h2>
        <form id="jobForm">
            <div class="group"><label>Company Name*</label><input type="text" name="Company Name" required placeholder="e.g. Maruti Suzuki"></div>
            <div class="group"><label>Location (Area/City)*</label><input type="text" name="Location" required placeholder="e.g. Kalol, Gandhinagar"></div>
            <div class="group"><label>WhatsApp/Contact Number*</label><input type="number" name="Contact Number" required placeholder="10-digit mobile number"></div>
            <div class="group"><label>Company Email (For receiving CVs)</label><input type="email" name="Company Email" placeholder="hr@company.com"></div>

            <div id="openings-container"></div>

            <button type="submit" id="subBtn" class="btn">Post Jobs Now</button>
        </form>
    </div>

    <script>
        // REPLACE THIS WITH YOUR NEW APPS SCRIPT URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
        
        // This loop generates 5 sections automatically
        const container = document.getElementById('openings-container');
        for (let i = 1; i <= 5; i++) {
            const isRequired = i === 1 ? 'required' : '';
            const statusLabel = i === 1 ? 'Required' : 'Optional';
            
            container.innerHTML += `
                <div class="section-h">Job Opening #${i} (${statusLabel})</div>
                <div class="group">
                    <label>Job Title ${i === 1 ? '*' : ''}</label>
                    <input type="text" name="Role ${i}" ${isRequired} placeholder="e.g. Accountant">
                </div>
                <div class="group">
                    <label>No. of Openings</label>
                    <input type="number" name="Openings ${i}" placeholder="e.g. 5">
                </div>
                <div class="group">
                    <label>Experience</label>
                    <input type="text" name="Exp ${i}" placeholder="e.g. 1-2 Years">
                </div>
                <div class="group">
                    <label>Salary</label>
                    <input type="text" name="Salary ${i}" placeholder="e.g. 20k - 25k">
                </div>
                <div class="group">
                    <label>Job Description</label>
                    <textarea name="JD ${i}" placeholder="Brief details about the work..."></textarea>
                </div>
            `;
        }

        const form = document.getElementById('jobForm');
        form.addEventListener('submit', e => {
            e.preventDefault(); 
            const b = document.getElementById('subBtn');
            b.disabled = true; 
            b.innerText = "Processing... Please wait";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => { 
                alert("Success! Your job openings are now live."); 
                window.location.href = "index.html"; 
            })
            .catch(err => { 
                alert("Error! Please check your internet connection."); 
                b.disabled = false; 
                b.innerText = "Post Jobs Now";
            });
        });
    </script>
</body>
</html>
