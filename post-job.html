<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job | KamNiVaat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #eff6ff; padding: 20px; }
        .card { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: 700; margin-bottom: 5px; font-size: 13px; }
        input, textarea { padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; }
        input:focus { border-color: #2563eb; }
        .btn { width: 100%; background: #2563eb; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; }
        .hp-field { display: none !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; margin-bottom:20px;">Post Job FREE</h2>
        <form id="jobForm">
            <input type="text" name="hp_field" class="hp-field">
            <div class="group"><label>Company Name</label><input type="text" name="Company Name" required></div>
            <div class="group"><label>Location</label><input type="text" name="Location" required></div>
            <div class="group"><label>Contact Number</label><input type="number" name="Contact Number" required></div>
            <div class="group"><label>Interview Details (Date/Time)</label><textarea name="Company Desc"></textarea></div>
            
            <div id="container"></div>
            <button type="submit" id="btn" class="btn">🚀 Post Now</button>
        </form>
    </div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
    const cont = document.getElementById('container');
    for (let i = 1; i <= 3; i++) {
        cont.innerHTML += `<div style="background:#f8fafc; padding:15px; border-radius:10px; margin-top:15px;">
            <div class="group"><label>Job Title ${i}</label><input type="text" name="Role ${i}"></div>
            <div class="group"><label>Qual / Salary</label><input type="text" name="Qual ${i}"></div>
        </div>`;
    }
    const form = document.getElementById('jobForm');
    form.addEventListener('submit', e => {
        e.preventDefault(); document.getElementById('btn').innerText = "Posting...";
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(() => { alert("Success!"); window.location.href="index.html"; })
        .catch(() => { alert("Error!"); });
    });
</script>
</body>
</html>
