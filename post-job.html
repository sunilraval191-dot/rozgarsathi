<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job | RozgarSathi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        .card { max-width: 600px; margin: 0 auto; background: white; padding: 35px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2563eb; text-align: center; margin-bottom: 25px; font-weight: 800; }
        .section-h { background: #eff6ff; padding: 12px 15px; margin: 25px 0 15px; font-weight: 700; color: #2563eb; border-radius: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-left: 5px solid #2563eb; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; color: #64748b; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: #2563eb; }
        textarea { height: 70px; resize: none; }
        .btn { width: 100%; background: #2563eb; color: white; padding: 18px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        .btn:disabled { background: #cbd5e1; }
        .hint { font-size: 11px; color: #94a3b8; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Post Your Hiring Needs</h2>
        <form id="jobForm">
            <div class="group"><label>Company Name*</label><input type="text" name="Company Name" required></div>
            <div class="group"><label>Location (Area/City)*</label><input type="text" name="Location" required></div>
            <div class="group"><label>WhatsApp Number*</label><input type="number" name="Contact Number" required></div>
            <div class="group"><label>Company Email (Optional)</label><input type="email" name="Company Email"></div>

            <div id="openings-container"></div>

            <button type="submit" id="subBtn" class="btn">Post All Jobs Now</button>
        </form>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
        
        // Dynamically generate 5 opening sections
        const container = document.getElementById('openings-container');
        for (let i = 1; i <= 5; i++) {
            const isReq = i === 1 ? 'required' : '';
            const label = i === 1 ? 'Job Opening #1 (Required)' : `Job Opening #${i} (Optional)`;
            
            container.innerHTML += `
                <div class="section-h">${label}</div>
                <div class="group"><label>Job Title ${i === 1 ? '*' : ''}</label><input type="text" name="Role ${i}" ${isReq} placeholder="e.g. Accountant"></div>
                <div class="group"><label>No. of Openings</label><input type="number" name="Openings ${i}" placeholder="e.g. 2"></div>
                <div class="group"><label>Experience</label><input type="text" name="Exp ${i}" placeholder="e.g. 2 Years"></div>
                <div class="group"><label>Salary</label><input type="text" name="Salary ${i}" placeholder="e.g. 20k"></div>
                <div class="group"><label>Job Description</label><textarea name="JD ${i}" placeholder="Brief details..."></textarea></div>
            `;
        }

        const form = document.getElementById('jobForm');
        form.addEventListener('submit', e => {
            e.preventDefault(); const b = document.getElementById('subBtn');
            b.disabled = true; b.innerText = "Processing...";
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(() => { alert("Success! Your jobs are live."); window.location.href="index.html"; })
            .catch(() => { alert("Error! Check connection."); b.disabled = false; });
        });
    </script>
</body>
</html>
