<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin | KamNiVaat</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .c { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #2563eb; color: white; }
        .del-btn { background: #ef4444; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="c">
        <h1>Admin Control</h1>
        <table id="adminTable">
            <thead><tr><th>Date</th><th>Employer</th><th>Roles</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="adminBody"></tbody>
        </table>
    </div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
    const pw = prompt("Password:");
    if (pw !== "1234") window.location.href = "index.html";

    async function loadData() {
        const res = await fetch(scriptURL);
        const data = await res.json();
        const body = document.getElementById('adminBody');
        body.innerHTML = "";
        data.reverse().forEach(row => {
            let roles = "";
            for(let i=1; i<=5; i++) { if(row[`Role ${i}`]) roles += `• ${row[`Role ${i}`]}<br>`; }
            const isDel = row.Status === "DELETED";
            body.innerHTML += `<tr><td>${new Date(row.Timestamp).toLocaleDateString()}</td><td><strong>${row['Company Name'] || 'N/A'}</strong><br>${row['Contact Number']}</td><td>${roles}</td><td>${row.Status || 'Active'}</td><td>${isDel ? '-' : `<button class="del-btn" onclick="hidePost('${row.Timestamp}')">Hide</button>`}</td></tr>`;
        });
    }
    async function hidePost(id) {
        if(!confirm("Hide this?")) return;
        const fd = new FormData(); fd.append('action', 'DELETE'); fd.append('id', id);
        await fetch(scriptURL, { method: 'POST', body: fd }); loadData();
    }
    window.onload = loadData;
</script>
</body>
</html>
