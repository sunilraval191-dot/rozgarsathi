<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozgarSathi | Jobs in Kalol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; }
        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .post-btn { background: var(--primary); color: white; padding: 0.7rem 1.2rem; border-radius: 10px; font-weight: 700; text-decoration: none; font-size: 0.85rem; }
        .hero { background: white; padding: 2.5rem 5%; border-bottom: 1px solid var(--border); text-align: center; }
        .search-box { max-width: 600px; margin: 0 auto; }
        .search-box input { width: 100%; padding: 1.1rem 1.5rem; border-radius: 16px; border: 2px solid var(--border); outline: none; font-size: 1rem; }
        .job-grid { padding: 2rem 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; max-width: 1300px; margin: 0 auto; }
        .job-card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 1.8rem; display: flex; flex-direction: column; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .v-badge { color: #0ea5e9; font-size: 0.75rem; font-weight: 800; margin-bottom: 0.5rem; text-transform: uppercase; border: 1px solid #0ea5e9; padding: 2px 8px; border-radius: 5px; display: inline-block; width: fit-content; }
        .co-name { font-size: 1.4rem; font-weight: 800; color: #0f172a; margin-bottom: 2px; }
        .loc { font-size: 0.9rem; color: #64748b; margin-bottom: 1.5rem; font-weight: 600; }
        .role-card { margin-bottom: 15px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 10px; }
        .role-title { font-weight: 800; font-size: 1.1rem; color: #1e293b; margin-bottom: 5px; }
        .badge { font-size: 0.7rem; font-weight: 700; padding: 0.3rem 0.6rem; border-radius: 6px; background: #eff6ff; color: #1e40af; margin: 0 4px 4px 0; display: inline-block; }
        .jd-text { font-size: 0.85rem; color: #4b5563; margin-top: 8px; font-style: italic; border-left: 3px solid #e5e7eb; padding-left: 8px; }
        .contact-box { background: #f8fafc; border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .contact-info { font-size: 1.1rem; font-weight: 800; color: #1e293b; }
        .share-btn { width: 100%; background: #25D366; color: white; padding: 1rem; text-align: center; border-radius: 12px; text-decoration: none; font-weight: 800; margin-top: 15px; display: block; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">RozgarSathi</a><a href="post-job.html" class="post-btn">Post Job FREE</a></header>
    <section class="hero"><div class="search-box"><input type="text" id="searchInput" placeholder="Search Company or Role..."></div></section>
    <div class="job-grid" id="jobBoard"></div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
    let allJobs = [];

    async function fetchJobs() {
        const board = document.getElementById('jobBoard');
        board.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Loading jobs...</p>";
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            const now = Date.now();
            const week = 7 * 24 * 60 * 60 * 1000;
            allJobs = data.filter(item => (now - new Date(item.Timestamp).getTime()) < week && item.Status !== "DELETED").reverse();
            display(allJobs);
        } catch (e) { board.innerHTML = "<p style='text-align:center; color:red; grid-column:1/-1;'>Error loading jobs.</p>"; }
    }

    function display(list) {
        const board = document.getElementById('jobBoard'); board.innerHTML = "";
        list.forEach(row => {
            let roles = "";
            let coName = row['Company Name'] || "Hiring Company";
            let waText = `*Job Alert from ${coName}*%0A📍 ${row['Location'] || 'Local Area'}%0A%0A`;
            
            for(let i=1; i<=5; i++) {
                const r = row[`Role ${i}`], q = row[`Qual ${i}`], o = row[`Openings ${i}`], d = row[`JD ${i}`];
                if (r && r.trim() !== "") {
                    roles += `<div class="role-card">
                        <div class="role-title">● ${r}</div>
                        <div>
                            ${q ? `<span class="badge">🎓 Qual: ${q}</span>` : ''}
                            ${o ? `<span class="badge">👥 ${o} Positions</span>` : ''}
                            <span class="badge">⏳ Exp: ${row['Exp '+i] || 'Any'}</span>
                            <span class="badge">💰 ${row['Salary '+i] || 'Best Salary'}</span>
                        </div>
                        ${d ? `<div class="jd-text">${d}</div>` : ''}
                    </div>`;
                    waText += `🔹 *${r}* ${q ? `[${q}]` : ''}%0A`;
                }
            }
            waText += `%0A👉 *Details:* https://sunilraval191-dot.github.io/rozgarsathi/`;
            
            const v = (row.Verified === "TRUE" || row.Verified === true) ? '<div class="v-badge">🛡️ Verified Business</div>' : '';
            board.innerHTML += `
                <div class="job-card">
                    ${v}
                    <div class="co-name">${coName}</div>
                    <div class="loc">📍 ${row['Location'] || 'Location not specified'}</div>
                    <div>${roles}</div>
                    <div class="contact-box">
                        <div style="font-size:0.75rem; font-weight:800; color:#94a3b8; text-transform:uppercase;">Contact Details:</div>
                        <div class="contact-info">📞 M: ${row['Contact Number'] || 'Not Provided'}</div>
                        ${row['Company Email'] ? `<div style="font-size:0.95rem; font-weight:600; color:#2563eb; margin-top:5px;">📧 ${row['Company Email']}</div>` : ''}
                    </div>
                    <a href="https://api.whatsapp.com/send?text=${waText}" target="_blank" class="share-btn">🟢 Share on WhatsApp</a>
                </div>`;
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        display(allJobs.filter(r => (r['Company Name']+r['Location']+r['Role 1']+r['Role 2']+r['Role 3']+r['Role 4']+r['Role 5']).toLowerCase().includes(q)));
    });
    window.onload = fetchJobs;
</script>
</body>
</html>
