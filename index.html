<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozgarSathi | Best Local Jobs in Kalol & Gandhinagar</title>
    <meta name="description" content="Find the latest job openings in Kalol. Hire accountants, chemists, and office staff. Post jobs for free on RozgarSathi.">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --success: #22c55e; --cv: #7c3aed; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; }
        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -1px; }
        .post-btn { background: var(--primary); color: white; padding: 0.7rem 1.4rem; border-radius: 10px; font-weight: 700; text-decoration: none; font-size: 0.85rem; }
        .hero { background: white; padding: 2.5rem 5%; border-bottom: 1px solid var(--border); text-align: center; }
        .search-box { max-width: 600px; margin: 0 auto; }
        .search-box input { width: 100%; padding: 1.1rem 1.5rem; border-radius: 16px; border: 2px solid var(--border); outline: none; font-size: 1rem; }
        .job-grid { padding: 2rem 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; max-width: 1300px; margin: 0 auto; }
        .job-card { background: white; border: 1px solid var(--border); border-radius: 24px; padding: 1.8rem; display: flex; flex-direction: column; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .job-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.08); }
        .v-badge { color: #0ea5e9; font-size: 0.75rem; font-weight: 800; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 4px; text-transform: uppercase; }
        .co-name { font-size: 1.4rem; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
        .loc { font-size: 0.9rem; color: #64748b; margin-bottom: 1.5rem; font-weight: 500; }
        .role-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; border-left: 5px solid var(--primary); }
        .role-title { font-weight: 700; font-size: 1.1rem; color: #1e293b; margin-bottom: 8px; }
        .badge { font-size: 0.75rem; font-weight: 600; padding: 0.4rem 0.75rem; border-radius: 8px; background: white; border: 1px solid var(--border); display: inline-flex; align-items: center; gap: 6px; margin: 0 6px 6px 0; color: #475569; }
        .jd { font-size: 0.85rem; color: #475569; margin-top: 10px; border-top: 1px solid #e2e8f0; padding-top: 8px; line-height: 1.4; }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: auto; padding-top: 10px; }
        .act-btn { text-align: center; padding: 0.8rem; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; transition: 0.2s; }
        .call { background: var(--success); }
        .share { background: #25D366; }
        .email { background: var(--cv); }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">RozgarSathi</a><a href="post-job.html" class="post-btn">Post Job FREE</a></header>
    <section class="hero"><div class="search-box"><input type="text" id="searchInput" placeholder="Search area, company, or job role..."></div></section>
    <div class="job-grid" id="jobBoard"></div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
    let allJobs = [];

    async function fetchJobs() {
        const board = document.getElementById('jobBoard');
        board.innerHTML = "<p style='text-align:center; grid-column:1/-1; padding:3rem;'>Loading current openings...</p>";
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            const now = Date.now();
            const week = 7 * 24 * 60 * 60 * 1000;
            allJobs = data.filter(item => (now - new Date(item.Timestamp).getTime()) < week && item.Status !== "DELETED").reverse();
            display(allJobs);
        } catch (e) { board.innerHTML = "<p style='text-align:center; color:red; grid-column:1/-1;'>Connection Error.</p>"; }
    }

    function display(list) {
        const board = document.getElementById('jobBoard'); board.innerHTML = "";
        list.forEach(row => {
            let roles = "";
            let waText = `*New Job Alert from ${row['Company Name']}*%0A📍 ${row['Location']}%0A%0A`;
            
            for(let i=1; i<=5; i++) {
                const title = row[`Role ${i}`], open = row[`Openings ${i}`];
                if (title && title.trim() !== "") {
                    roles += `<div class="role-card"><div class="role-title">${title}</div><div>${open ? `<span class="badge">👥 Openings: ${open}</span>` : ''}<span class="badge">⏳ Exp: ${row['Exp '+i] || 'Fresher'}</span><span class="badge">💰 Salary: ${row['Salary '+i] || 'Best'}</span></div>${row['JD '+i] ? `<div class="jd">${row['JD '+i]}</div>` : ''}</div>`;
                    waText += `🔹 *${title}* (${open || 1} Positions)%0A`;
                }
            }
            waText += `%0A👉 *View & Apply:* https://sunilraval191.github.io/rozgarsathi/%0A%0A_Shared via RozgarSathi_`;
            
            const v = (row.Verified === "TRUE" || row.Verified === true) ? '<div class="verified">🛡️ Verified Business</div>' : '';
            board.innerHTML += `<div class="job-card">${v}<div class="co-name">${row['Company Name']}</div><div class="loc">📍 Location: ${row['Location']}</div><div>${roles}</div><div class="actions"><a href="tel:${row['Contact Number']}" class="act-btn call">📞 Call</a><a href="https://api.whatsapp.com/send?text=${waText}" target="_blank" class="act-btn share">🟢 Share</a><a href="mailto:${row['Company Email']}?subject=Job Application" class="act-btn email">📧 CV</a></div></div>`;
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        display(allJobs.filter(r => (r['Company Name']+r['Location']+r['Role 1']+r['Role 2']+r['Role 3']+r['Role 4']+r['Role 5']).toLowerCase().includes(q)));
    });
    window.onload = fetchJobs;
</script>
</body>
</html>
